<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Calm Vibes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070709; --text-main: #ffffff; --warn-yellow: #eab308;
            --glass-bg: rgba(15, 15, 20, 0.4); --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark); color: var(--text-main); font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Navbar */
        .nav-bar {
            position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .nav-brand { color: #fff; font-weight: 900; text-decoration: none; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 1rem; }
        .nav-link {
            color: #fff; text-decoration: none; font-weight: 700; padding: 0.5rem 1rem; border-radius: 8px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); transition: all 0.3s ease;
        }
        .nav-link:hover { background: rgba(234, 179, 8, 0.2); color: var(--warn-yellow); border-color: var(--warn-yellow); transform: translateY(-2px); }

        /* Background Animated Ducky */
        .duck-container {
            position: fixed; top: 50%; left: 50%; width: 85vmin; max-width: 600px;
            transform: translate(-50%, -50%); z-index: -1; opacity: 0.08;
            pointer-events: none; animation: float 10s ease-in-out infinite;
        }
        .pixel-duck { width: 100%; height: auto; image-rendering: pixelated; filter: drop-shadow(0 0 30px rgba(234, 179, 8, 0.5)); }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) rotate(-2deg) scale(1); }
            50% { transform: translate(-50%, -55%) rotate(2deg) scale(1.02); }
        }

        /* Weather Effects */
        #weather-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; }
        .weather-drop { position: absolute; top: -10vh; background: rgba(255, 255, 255, 0.3); }
        .rain { width: 2px; height: 25px; animation: fall-rain linear infinite; }
        .snow { width: 6px; height: 6px; border-radius: 50%; background: rgba(255, 255, 255, 0.8); animation: fall-snow linear infinite; }
        
        @keyframes fall-rain { to { transform: translateY(120vh); } }
        @keyframes fall-snow { to { transform: translateY(120vh) translateX(20px); } }

        /* Main Content */
        .content-wrapper { position: relative; z-index: 10; text-align: center; padding: 2rem; width: 100%; }
        h1 {
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; letter-spacing: -0.04em;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2.5rem;
        }

        /* Footer */
        .footer { position: absolute; bottom: 2rem; display: flex; gap: 2rem; z-index: 10; }
        .footer a { color: #52525b; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s ease; }
        .footer a:hover { color: #ffffff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-brand">Just Calm Vibes</a>
        <div class="nav-links">
            <a href="/wall.html" class="nav-link">Wall 📝</a>
            <a href="/gift/" class="nav-link">Gift 🎁</a>
        </div>
    </nav>

    <div id="weather-container"></div>

    <div class="duck-container">
        <svg class="pixel-duck" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
            <rect x="4" y="2" width="4" height="3" fill="#eab308"/>
            <rect x="2" y="5" width="8" height="4" fill="#eab308"/>
            <rect x="1" y="6" width="1" height="2" fill="#eab308"/>
            <rect x="10" y="6" width="1" height="2" fill="#eab308"/>
            <rect x="8" y="3" width="3" height="1" fill="#f97316"/>
            <rect x="6" y="3" width="1" height="1" fill="#070709"/>
            <rect x="4" y="2" width="1" height="1" fill="#fef08a"/>
            <rect x="2" y="5" width="1" height="1" fill="#fef08a"/>
        </svg>
    </div>

    <div class="content-wrapper">
        <h1>Just calm vibes.</h1>
    </div>

    <div class="footer">
        <a href="/privacy-policy.html">Privacy Policy</a>
        <a href="/tos.html">Terms of Service</a>
    </div>

    <script>
        // Weather Logic
        async function initWeather() {
            try {
                // Ask user for location
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                });
                
                const { latitude, longitude } = pos.coords;
                // Replace with your actual OpenWeatherMap API Key
                const apiKey = "YOUR_OPENWEATHER_API_KEY"; 
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${apiKey}`);
                
                if (!res.ok) return; // Fail silently if API errors
                
                const data = await res.json();
                const condition = data.weather[0].main.toLowerCase();
                
                if (condition.includes('rain')) startWeatherEffect('rain');
                if (condition.includes('snow')) startWeatherEffect('snow');
                
            } catch (error) {
                console.log("Weather effect skipped (location denied or unavailable).");
            }
        }

        function startWeatherEffect(type) {
            const container = document.getElementById('weather-container');
            const dropCount = type === 'rain' ? 80 : 50;
            
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.classList.add('weather-drop', type);
                drop.style.left = `${Math.random() * 100}vw`;
                drop.style.animationDuration = `${Math.random() * 1.5 + 0.5}s`;
                drop.style.animationDelay = `${Math.random() * 2}s`;
                drop.style.opacity = Math.random() * 0.5 + 0.3;
                container.appendChild(drop);
            }
        }

        initWeather();
    </script>
</body>
</html>
